name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore App.csproj
      - name: Build
        run: dotnet build App.csproj -c Release --no-restore
      - name: Test
        run: dotnet test Tests/App.Tests.csproj -c Release

  frontend:
    name: Frontend (bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Unit tests
        run: bun run test
      - name: Build
        run: bun run build
